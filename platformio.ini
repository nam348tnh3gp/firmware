; ==================================================
; BRUCE FIRMWARE - ESP32-S3 MASTER + ESP32-C5 SLAVE
; ==================================================
; Sơ đồ kết nối theo file so_do_day_du.xlsx
; - S3: Màn hình, SD Card, phím 5-way, UART giao tiếp C5
; - C5: NRF24, CC1101, PN532 NFC, IR (thu/phát)
; ==================================================

[platformio]
default_envs = esp32-s3-master
board_dir = boards

; ========== THƯ VIỆN DÙNG CHUNG ==========
[common]
lib_deps = 
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.3
    adafruit/Adafruit BusIO@^1.16.2
    adafruit/Adafruit GFX Library@^1.11.11
    nrf24/RF24@^1.4.8
    zadi15/ELECHOUSE_CC1101_SRC_DRV@^1.0.0

; ========== ESP32-S3 MASTER ==========
; Vai trò: Điều khiển màn hình, SD Card, phím 5-way
; Giao tiếp với C5 qua UART (TX=17, RX=18)
[env:esp32-s3-master]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_port = /dev/ttyUSB0
upload_speed = 921600
upload_port = /dev/ttyUSB0

board_build.flash_mode = qio
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_flags = 
    -DCONFIG_BRUCE_MASTER=1
    -DHAS_SCREEN=1
    -DHAS_SDCARD=1
    -DHAS_KEYPAD=1
    -I include

lib_deps = 
    ${common.lib_deps}
    arduino-libraries/SD@^1.2.4

build_src_filter = 
    +<*.cpp>
    +<*.c>
    -<main_c5.cpp>

; ========== ESP32-C5 SLAVE ==========
; Vai trò: NRF24, CC1101, PN532 NFC, IR
; Giao tiếp với S3 qua UART (RX=17, TX=18)
[env:esp32-c5-slave]
platform = espressif32
board = esp32-c5-devkitm-1
framework = arduino
monitor_speed = 115200
monitor_port = /dev/ttyUSB1
upload_speed = 921600
upload_port = /dev/ttyUSB1

board_build.flash_mode = qio
board_build.f_cpu = 160000000L
board_build.flash_size = 4MB
board_build.partitions = default_4MB.csv

build_flags = 
    -DCONFIG_BRUCE_SLAVE=1
    -DHAS_NRF24=1
    -DHAS_CC1101=1
    -DHAS_PN532=1
    -DHAS_IR=1
    -I include

lib_deps = 
    ${common.lib_deps}
    wire@^1.0.1
    z3t0/IRremote@^4.4.1

build_src_filter = 
    +<*.cpp>
    +<*.c>
    -<main_s3.cpp>

; ========== CẤU HÌNH DEBUG (Tùy chọn) ==========
[env:esp32-s3-master-debug]
extends = env:esp32-s3-master
build_flags = 
    ${env:esp32-s3-master.build_flags}
    -DDEBUG_LEVEL=4
    -DCORE_DEBUG_LEVEL=5

[env:esp32-c5-slave-debug]
extends = env:esp32-c5-slave
build_flags = 
    ${env:esp32-c5-slave.build_flags}
    -DDEBUG_LEVEL=4
    -DCORE_DEBUG_LEVEL=5
