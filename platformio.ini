; ==================================================
; BRUCE FIRMWARE - CUSTOM ESP32-S3 + ESP32-C5
; ==================================================

[platformio]
default_envs = esp32-s3-master

[common]
lib_deps = 
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.3
    adafruit/Adafruit BusIO@^1.16.2
    adafruit/Adafruit GFX Library@^1.11.11
    bblanchon/ArduinoJson@^7.0.4
    contrem/arduino-timer@^3.0.1
    knolleary/PubSubClient@^2.8
    linkedsoftwaresolutions/IRremoteESP8266@^2.8.6
    miguelbalboa/MFRC522@^1.4.11
    nrf24/RF24@^1.4.8
    paulstoffregen/OneWire@^2.3.8
    sparkfun/SparkFun MAX1704x Fuel Gauge@^1.0.2
    tzapu/WiFiManager@^2.0.17

; ========== ESP32-S3 MASTER ==========
[env:esp32-s3-master]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = qio
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
board_build.flash_size = 16MB

build_flags = 
    ${common.build_flags}
    -DBOARD_NAME="ESP32-S3_Master"
    -DCONFIG_BRUCE_MASTER=1
    -DHAS_SCREEN=1
    -DHAS_SDCARD=1
    -DHAS_NRF24=1
    -DHAS_PN532=1
    -DHAS_IR=1
    -DHAS_KEYPAD=1

lib_deps = 
    ${common.lib_deps}
    wire
    spi

; ========== ESP32-C5 SLAVE ==========
[env:esp32-c5-slave]
platform = espressif32
board = esp32-c5-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = qio
board_build.mcu = esp32c5

build_flags = 
    ${common.build_flags}
    -DBOARD_NAME="ESP32-C5_Slave"
    -DCONFIG_BRUCE_SLAVE=1
    -DHAS_NRF24=1
    -DHAS_SUBGHZ=1

lib_deps = 
    ${common.lib_deps}
