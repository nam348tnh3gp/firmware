; ==================================================
; BRUCE FIRMWARE - CUSTOM ESP32-S3 + ESP32-C5
; ==================================================
[platformio]
default_envs = esp32-s3-master

[common]
lib_deps = 
    adafruit/Adafruit ST7735 and ST7789 Library
    nrf24/RF24
    elechouse/ELECHOUSE_CC1101_SRC_DRV

; ========== ESP32-S3 MASTER ==========
[env:esp32-s3-master]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = qio
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB

build_flags = 
    -DCONFIG_BRUCE_MASTER=1
    -DHAS_SCREEN=1
    -DHAS_SDCARD=1
    -DHAS_KEYPAD=1

lib_deps = 
    ${common.lib_deps}
    arduino-libraries/SD

src_filter = +<*> -<main_c5.cpp>

; ========== ESP32-C5 SLAVE ==========
[env:esp32-c5-slave]
platform = espressif32
board = esp32-c5-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags = 
    -DCONFIG_BRUCE_SLAVE=1
    -DHAS_NRF24=1
    -DHAS_CC1101=1
    -DHAS_PN532=1
    -DHAS_IR=1

lib_deps = 
    ${common.lib_deps}
    wire
    IRremote

src_filter = +<*> -<main_s3.cpp>

src_filter = +<*> -<main_s3.cpp>
